version: '3.8'

services:
  # 개발용 PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: dc-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dc_simulator_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcpassword}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dc-dev-network

  # 개발용 Redis
  redis:
    image: redis:7-alpine
    container_name: dc-redis-dev
    ports:
      - "6379:6379"
    networks:
      - dc-dev-network

  # 개발용 백엔드 (핫 리로드)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dc-backend-dev
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key
      - JWT_SECRET_KEY=dev-jwt-secret
      - DEV_DATABASE_URL=postgresql://dcuser:dcpassword@postgres:5432/dc_simulator_dev
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
      - uploads_dev_data:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - dc-dev-network
    command: flask run --host=0.0.0.0 --port=5000 --debug

  # 개발용 프론트엔드 (핫 리로드)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dc-frontend-dev
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dc-dev-network
    command: npm start

volumes:
  postgres_dev_data:
    driver: local
  uploads_dev_data:
    driver: local

networks:
  dc-dev-network:
    driver: bridge