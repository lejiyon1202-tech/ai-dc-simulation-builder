version: '3.8'

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15-alpine
    container_name: dc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dc_simulator}
      POSTGRES_USER: ${POSTGRES_USER:-dcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - dc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (캐싱 및 세션)
  redis:
    image: redis:7-alpine
    container_name: dc-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - dc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Flask 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dc-backend
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-jwt-secret}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dcuser}:${POSTGRES_PASSWORD:-dcpassword}@postgres:5432/${POSTGRES_DB:-dc_simulator}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery 워커 (백그라운드 작업)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dc-celery
    command: celery -A app.celery worker --loglevel=info
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dcuser}:${POSTGRES_PASSWORD:-dcpassword}@postgres:5432/${POSTGRES_DB:-dc_simulator}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dc-network
    restart: unless-stopped

  # React 프론트엔드
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    container_name: dc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  dc-network:
    driver: bridge